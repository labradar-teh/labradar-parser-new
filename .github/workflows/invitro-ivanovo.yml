name: Invitro Ivanovo Parser

on:
  workflow_dispatch:

jobs:
  invitro:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl lxml urllib3

      - name: Prepare folders
        run: |
          mkdir -p out
          mkdir -p output

      - name: Run Invitro parser
        run: |
          set -euxo pipefail
          python parsers/invitro_ivanovo.py

      - name: Debug output
        if: always()
        run: |
          echo "=== out ==="
          ls -lah out || true
          echo "=== output ==="
          ls -lah output || true

          python - << 'PY'
          from pathlib import Path
          import pandas as pd

          candidates = [
              Path("out/invitro_ivanovo.csv"),
              Path("output/invitro_ivanovo.csv"),
          ]

          found = False
          for csv_file in candidates:
              if csv_file.exists():
                  found = True
                  print(f"FOUND: {csv_file}")
                  try:
                      df = pd.read_csv(csv_file)
                      print(f"Rows: {len(df)}")
                      if len(df) > 0:
                          print(df.head(20).to_string(index=False))
                  except Exception as e:
                      print(f"CSV read error: {e}")

          if not found:
              print("No invitro CSV found")
          PY

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invitro-ivanovo-csv
          path: |
            out/invitro_ivanovo.csv
            output/invitro_ivanovo.csv
          if-no-files-found: error

      - name: Upload XLSX artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invitro-ivanovo-xlsx
          path: |
            out/invitro_ivanovo.xlsx
            output/invitro_ivanovo.xlsx
          if-no-files-found: ignore
