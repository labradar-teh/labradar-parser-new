name: Invitro Kostroma Parser

on:
  workflow_dispatch:
  schedule:
    - cron: "25 3 * * 1"

jobs:
  invitro:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl beautifulsoup4 lxml urllib3

      - name: Prepare folders
        run: |
          mkdir -p output
          mkdir -p out

      - name: Run Invitro parser
        run: |
          set -euxo pipefail
          python parsers/invitro_kostroma.py --outdir output

      - name: Debug output
        if: always()
        run: |
          echo "=== output ==="
          ls -lah output || true
          echo "=== out ==="
          ls -lah out || true

          python - << 'PY'
          from pathlib import Path
          import pandas as pd

          candidates = [
              Path("output/invitro_kostroma.csv"),
              Path("out/invitro_kostroma.csv"),
          ]

          found = False
          for csv_file in candidates:
              if csv_file.exists():
                  found = True
                  print(f"FOUND: {csv_file}")
                  try:
                      df = pd.read_csv(csv_file)
                      print(f"Rows: {len(df)}")
                      if len(df) > 0:
                          print(df.head(20).to_string(index=False))
                          print("Unique URLs:", df["url"].nunique() if "url" in df.columns else "no url column")
                          print("Filled prices:", df["price"].replace('', pd.NA).notna().sum() if "price" in df.columns else "no price column")
                  except Exception as e:
                      print(f"CSV read error: {e}")

          if not found:
              print("No invitro CSV found")
          PY

      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invitro-kostroma-csv
          path: |
            output/invitro_kostroma.csv
            out/invitro_kostroma.csv
          if-no-files-found: error

      - name: Upload XLSX artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: invitro-kostroma-xlsx
          path: |
            output/invitro_kostroma.xlsx
            out/invitro_kostroma.xlsx
          if-no-files-found: ignore
