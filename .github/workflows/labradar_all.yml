name: LabRadar — All Parsers

on:
  workflow_dispatch:
    inputs:
      labs:
        description: "Лаборатории через пробел (citilab gemotest helix invitro kislorod mediks) или all"
        required: false
        default: "all"
      regions:
        description: "Регионы через пробел (ivanovo kostroma) или all"
        required: false
        default: "all"
  schedule:
    # каждые 2 суток — в 03:00 UTC по нечётным дням (1, 3, 5, ...)
    - cron: "0 3 1-31/2 * *"

jobs:
  parse:
    name: "${{ matrix.lab }} / ${{ matrix.region }}"
    runs-on: ubuntu-latest
    timeout-minutes: 240
    # Продолжать остальные job'ы даже если один упал
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        lab:    [citilab, gemotest, helix, invitro, kislorod, mediks]
        region: [ivanovo, kostroma]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare output dir
        run: mkdir -p output

      - name: Run parser — ${{ matrix.lab }} / ${{ matrix.region }}
        run: |
          python parsers/${{ matrix.lab }}.py \
            --region ${{ matrix.region }} \
            --outdir output

      - name: Show output
        if: always()
        run: |
          echo "=== output ==="
          ls -lah output/ || true
          python - << 'PY'
          from pathlib import Path
          import pandas as pd
          lab = "${{ matrix.lab }}"
          region = "${{ matrix.region }}"
          csv_file = Path(f"output/{lab}_{region}.csv")
          if csv_file.exists():
              try:
                  df = pd.read_csv(csv_file)
                  print(f"[{lab}/{region}] rows={len(df)}")
                  if len(df) > 0:
                      print(df.head(5).to_string(index=False))
              except Exception as e:
                  print(f"CSV read error: {e}")
          else:
              print(f"[{lab}/{region}] CSV not found")
          PY

      - name: Upload artifact — ${{ matrix.lab }}_${{ matrix.region }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.lab }}_${{ matrix.region }}"
          path: |
            output/${{ matrix.lab }}_${{ matrix.region }}.csv
            output/${{ matrix.lab }}_${{ matrix.region }}.xlsx
          if-no-files-found: warn
          retention-days: 30
