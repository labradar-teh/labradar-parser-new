name: Kislorod Ivanovo Parser

on:
  workflow_dispatch:
  schedule:
    - cron: "45 3 * * 1"

jobs:
  kislorod:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl lxml playwright

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Create output dir
        run: mkdir -p output

      - name: Run Kislorod parser
        run: |
          set -euxo pipefail
          python parsers/kislorod_ivanovo.py

      - name: Debug output
        if: always()
        run: |
          echo "FILES:"
          ls -lah output || true

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-ivanovo-csv
          path: output/kislorod_ivanovo.csv
          if-no-files-found: error

      - name: Upload XLSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-ivanovo-xlsx
          path: output/kislorod_ivanovo.xlsx
          if-no-files-found: error
