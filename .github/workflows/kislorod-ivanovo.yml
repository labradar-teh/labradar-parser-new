# kislorod-ivanovo.yml (исправленный — не падает на upload)

name: Kislorod Ivanovo Parser

on:
  workflow_dispatch:

jobs:
  kislorod:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4 openpyxl

      - run: mkdir -p output

      - run: python parser_kislorod.py

      - run: ls -lah output

      - uses: actions/upload-artifact@v4
        with:
          name: kislorod-csv
          path: output/kislorod_ivanovo.csv

      - uses: actions/upload-artifact@v4
        with:
          name: kislorod-xlsx
          path: output/kislorod_ivanovo.xlsx
