name: Kislorod Ivanovo Parser

on:
  workflow_dispatch:

jobs:
  kislorod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r parsers/requirements.txt

      - name: Create output folder
        run: mkdir -p out

      - name: Run Kislorod parser
        run: |
          python parsers/kislorod_ivanovo.py

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-ivanovo-csv
          path: out/kislorod_ivanovo.csv

      - name: Upload XLSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-ivanovo-xlsx
          path: out/kislorod_ivanovo.xlsx

      - name: Upload debug HTML
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-debug-html
          path: out/kislorod_debug.html
          if-no-files-found: ignore
