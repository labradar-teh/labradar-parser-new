# .github/workflows/kislorod-ivanovo.yml

name: Kislorod Ivanovo Parser

on:
  workflow_dispatch:

jobs:
  kislorod:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl

      - name: Prepare output dir
        run: mkdir -p output

      - name: Run parser
        run: python parser_kislorod.py

      - name: Show output files
        run: |
          ls -lah
          ls -lah output || true

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-ivanovo-csv
          path: output/kislorod_ivanovo.csv
          if-no-files-found: ignore

      - name: Upload XLSX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-ivanovo-xlsx
          path: output/kislorod_ivanovo.xlsx
          if-no-files-found: ignore
