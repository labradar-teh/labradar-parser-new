name: kislorod-ivanovo

on:
  workflow_dispatch:

jobs:
  kislorod:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl

      - name: Prepare output dir
        run: mkdir -p output

      - name: Syntax check
        run: python -m py_compile parsers/kislorod_ivanovo.py

      - name: Run parser
        run: python parsers/kislorod_ivanovo.py

      - name: Debug output
        if: always()
        run: |
          ls -lah
          ls -lah parsers || true
          ls -lah output || true
          wc -l output/kislorod_ivanovo.csv || true

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-ivanovo-csv
          path: output/kislorod_ivanovo.csv
          if-no-files-found: error

      - name: Upload XLSX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kislorod-ivanovo-xlsx
          path: output/kislorod_ivanovo.xlsx
          if-no-files-found: error
