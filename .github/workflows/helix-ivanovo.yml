# .github/workflows/helix-ivanovo.yml

name: helix-ivanovo

on:
  workflow_dispatch:

jobs:
  helix:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl

      - name: Prepare output dir
        run: mkdir -p output

      - name: Check files
        run: |
          pwd
          ls -lah
          find . -maxdepth 3 -type f | sort

      - name: Syntax check
        run: python -m py_compile parser_helix.py

      - name: Run parser
        run: python parser_helix.py

      - name: Show output
        if: always()
        run: |
          ls -lah
          ls -lah output || true
          wc -l output/helix_ivanovo.csv || true

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helix-ivanovo-csv
          path: output/helix_ivanovo.csv
          if-no-files-found: error

      - name: Upload XLSX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helix-ivanovo-xlsx
          path: output/helix_ivanovo.xlsx
          if-no-files-found: error
