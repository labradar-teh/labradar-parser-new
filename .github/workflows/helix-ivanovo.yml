name: helix-ivanovo

on:
  workflow_dispatch:

jobs:
  helix:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl

      - name: Run parser
        run: |
          python parser_helix.py

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: helix-ivanovo-csv
          path: helix-ivanovo.csv

      - name: Upload XLSX
        uses: actions/upload-artifact@v4
        with:
          name: helix-ivanovo-xlsx
          path: helix-ivanovo.xlsx
