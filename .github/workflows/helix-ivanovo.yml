name: Helix Ivanovo Parser

on:
  workflow_dispatch:

jobs:
  helix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r parsers/requirements.txt

      - name: Create output folder
        run: mkdir -p out

      - name: Run Helix parser
        run: |
          python parsers/helix_ivanovo.py

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-ivanovo-csv
          path: out/helix_ivanovo.csv

      - name: Upload XLSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-ivanovo-xlsx
          path: out/helix_ivanovo.xlsx
