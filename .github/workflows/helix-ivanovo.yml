name: Helix Ivanovo Parser

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 1"

jobs:
  parse-helix-ivanovo:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl lxml

      - name: Create output directory
        run: mkdir -p output

      - name: Run Helix parser
        run: |
          python parsers/helix_ivanovo.py --outdir output

      - name: Show output files
        run: |
          ls -lah output
          echo "CSV preview:"
          python - << 'PY'
          import pandas as pd
          from pathlib import Path

          csv_file = Path("output/helix_ivanovo.csv")
          if csv_file.exists():
              df = pd.read_csv(csv_file)
              print(df.head(20).to_string(index=False))
              print(f"\nRows: {len(df)}")
          else:
              print("CSV not found")
          PY

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-ivanovo-csv
          path: output/helix_ivanovo.csv
          if-no-files-found: error

      - name: Upload XLSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-ivanovo-xlsx
          path: output/helix_ivanovo.xlsx
          if-no-files-found: error
