name: Helix Ivanovo Parser

on:
  workflow_dispatch:

jobs:
  helix:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install pandas openpyxl beautifulsoup4 lxml playwright

      - name: Install browser
        run: |
          python -m playwright install chromium

      - name: Run parser
        run: |
          python parsers/helix_ivanovo.py --outdir output

      - name: Debug
        run: |
          ls -lah output || true

          python - << 'PY'
          import pandas as pd
          from pathlib import Path

          p = Path("output/helix_ivanovo.csv")
          if p.exists():
              df = pd.read_csv(p)
              print("Rows:", len(df))
              print(df.head(20))
          else:
              print("NO FILE")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: helix
          path: output/*
