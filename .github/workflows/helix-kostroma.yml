name: helix-kostroma

on:
  workflow_dispatch:

jobs:
  helix:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl

      - name: Prepare output dir
        run: mkdir -p output

      - name: Syntax check
        run: python -m py_compile parsers/helix_kostroma.py

      - name: Run parser
        run: python parsers/helix_kostroma.py

      - name: Show output
        if: always()
        run: |
          ls -lah output || true
          wc -l output/helix_kostroma.csv || true

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helix-kostroma-csv
          path: output/helix_kostroma.csv
          if-no-files-found: error

      - name: Upload XLSX
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helix-kostroma-xlsx
          path: output/helix_kostroma.xlsx
          if-no-files-found: error
