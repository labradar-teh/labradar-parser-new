name: Gemotest Ivanovo Parser

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

jobs:
  gemotest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl lxml

      - name: Create output dir
        run: mkdir -p output

      - name: Run Gemotest parser
        run: |
          set -euxo pipefail
          python parsers/gemotest_ivanovo.py

      - name: Debug output
        run: |
          echo "FILES:"
          ls -lah output || true

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: gemotest-ivanovo-csv
          path: output/gemotest_ivanovo.csv
          if-no-files-found: error

      - name: Upload XLSX
        uses: actions/upload-artifact@v4
        with:
          name: gemotest-ivanovo-xlsx
          path: output/gemotest_ivanovo.xlsx
          if-no-files-found: error
