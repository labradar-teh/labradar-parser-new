name: Mediks Ivanovo Parser

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"

jobs:
  mediks:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas openpyxl lxml

      - name: Create output dir
        run: mkdir -p output

      - name: Run Mediks parser
        run: |
          set -euxo pipefail
          python parsers/mediks_ivanovo.py --outdir output

      - name: Debug output
        if: always()
        run: |
          echo "FILES:"
          ls -lah output || true
          python - << 'PY'
          from pathlib import Path
          import pandas as pd

          csv_file = Path("output/mediks_ivanovo.csv")
          if csv_file.exists():
              try:
                  df = pd.read_csv(csv_file)
                  print(f"Rows: {len(df)}")
                  print(df.head(20).to_string(index=False))
              except Exception as e:
                  print(f"CSV read error: {e}")
          else:
              print("CSV not found")
          PY

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediks-ivanovo-csv
          path: output/mediks_ivanovo.csv
          if-no-files-found: error

      - name: Upload XLSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: mediks-ivanovo-xlsx
          path: output/mediks_ivanovo.xlsx
          if-no-files-found: error
